[defaults]
# Use this inventory file automatically.
inventory = ./inventory/hosts.yml

# Disable retry files such as playbook.retry.
retry_files_enabled = False

# Automatically discover Python 3 on managed nodes.
interpreter_python = auto_silent

# Lab convenience: do not interrupt the first connection
# to ask about SSH host-key verification.
host_key_checking = False

[ssh_connection]
# Reuse SSH connections to improve playbook speed.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
