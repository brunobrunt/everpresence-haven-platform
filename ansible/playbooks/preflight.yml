---
# This playbook performs read-only validation before Kubernetes
# packages or containerd are installed.
#
# It checks:
# - Ubuntu version
# - CPU and memory
# - Root disk capacity
# - Static IP and gateway
# - Swap status
# - Cloud-init completion
# - QEMU guest agent
# - Time synchronization
# - DNS resolution

- name: Validate Kubernetes node prerequisites
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Workers require more RAM and disk than control-plane nodes.
    minimum_memory_mb: >-
      {{
        worker_minimum_memory_mb
        if 'workers' in group_names
        else control_plane_minimum_memory_mb
      }}

    minimum_disk_gib: >-
      {{
        worker_minimum_disk_gib
        if 'workers' in group_names
        else control_plane_minimum_disk_gib
      }}

    minimum_disk_bytes: >-
      {{
        (minimum_disk_gib | int) * 1024 * 1024 * 1024
      }}

  tasks:
    - name: Find the root filesystem
      ansible.builtin.set_fact:
        root_mount: >-
          {{
            ansible_mounts
            | selectattr('mount', 'equalto', '/')
            | first
          }}

    - name: Check swap usage
      ansible.builtin.command: swapon --show --noheadings
      register: swap_output
      changed_when: false

    - name: Check cloud-init status
      ansible.builtin.command: cloud-init status --long
      register: cloud_init_status
      changed_when: false

    - name: Check cloud-init completion marker
      ansible.builtin.stat:
        path: /var/lib/eph-cloud-init-complete
      register: cloud_init_marker

    - name: Check QEMU guest agent
      ansible.builtin.command: systemctl is-active qemu-guest-agent
      register: qemu_agent_status
      changed_when: false
      failed_when: false

    - name: Check time synchronization
      ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
      register: ntp_status
      changed_when: false
      failed_when: false

    - name: Check DNS resolution
      ansible.builtin.command: getent hosts ubuntu.com
      register: dns_status
      changed_when: false
      failed_when: false

    - name: Validate common node requirements
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_release == "noble"
          - (ansible_processor_vcpus | int) >= 2
          - (ansible_memtotal_mb | int) >= (minimum_memory_mb | int)
          - (root_mount.size_total | int) >= (minimum_disk_bytes | int)
          - ansible_default_ipv4.address == ansible_host
          - ansible_default_ipv4.gateway == cluster_gateway
          - (swap_output.stdout | trim) == ""
          - "'status: done' in cloud_init_status.stdout"
          - cloud_init_marker.stat.exists
          - (qemu_agent_status.stdout | trim) == "active"
          - (ntp_status.stdout | trim) == "yes"
          - dns_status.rc == 0

        success_msg: >-
          {{ inventory_hostname }} passed all Kubernetes preflight checks.

        fail_msg: >-
          {{ inventory_hostname }} failed one or more Kubernetes
          preflight checks. Review the task output before continuing.

    - name: Display node validation summary
      ansible.builtin.debug:
        msg:
          - "Node: {{ inventory_hostname }}"
          - "Role groups: {{ group_names | join(', ') }}"
          - "Operating system: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "vCPU: {{ ansible_processor_vcpus }}"
          - "Memory: {{ ansible_memtotal_mb }} MB"
          - "Root disk: {{ (root_mount.size_total / 1024 / 1024 / 1024) | round(1) }} GiB"
          - "IP address: {{ ansible_default_ipv4.address }}"
          - "Gateway: {{ ansible_default_ipv4.gateway }}"
          - "Swap: disabled"
          - "Cloud-init: done"
          - "QEMU guest agent: active"
          - "NTP synchronized: {{ ntp_status.stdout | trim }}"
          - "DNS resolution: working"
