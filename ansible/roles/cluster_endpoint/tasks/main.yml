---
# This role prepares the shared Kubernetes API endpoint.
#
# It does not activate the virtual IP.
# It only makes k8s-api.lab resolve to 172.16.10.30
# and confirms that the kube-vip network interface exists.

# regexp searches for any existing line ending with k8s-api.lab.
# If found, lineinfile replaces it with the correct VIP entry.
# This prevents duplicate or outdated /etc/hosts entries.

- name: Add Kubernetes API endpoint to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '.*\s+k8s-api\.lab$'
    line: "{{ control_plane_vip }} {{ control_plane_endpoint_name }}"
    state: present
    owner: root
    group: root
    mode: "0644"

- name: Check Kubernetes API name resolution
  ansible.builtin.command:
    argv:
      - getent
      - hosts
      - "{{ control_plane_endpoint_name }}"
  register: api_name_resolution
  changed_when: false

- name: Check kube-vip network interface
  ansible.builtin.command:
    argv:
      - ip
      - link
      - show
      - "{{ kube_vip_interface }}"
  register: kube_vip_interface_status
  changed_when: false

- name: Validate Kubernetes API endpoint preparation
  ansible.builtin.assert:
    that:
      - control_plane_vip in api_name_resolution.stdout
      - kube_vip_interface_status.rc == 0
    success_msg: >-
      {{ inventory_hostname }} can resolve
      {{ control_plane_endpoint_name }} to {{ control_plane_vip }}.
    fail_msg: >-
      {{ inventory_hostname }} failed the Kubernetes API
      endpoint validation.

- name: Display endpoint summary
  ansible.builtin.debug:
    msg:
      - "Node: {{ inventory_hostname }}"
      - "API name: {{ control_plane_endpoint_name }}"
      - "API VIP: {{ control_plane_vip }}"
      - "API port: {{ control_plane_port }}"
      - "kube-vip interface: {{ kube_vip_interface }}"
